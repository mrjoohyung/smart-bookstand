<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>스마트 독서대 v4 + BLE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:#0a0a0a;color:#fff;overflow:hidden;height:100dvh;display:flex;flex-direction:column}
#top{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:#111;z-index:10}
#top h1{font-size:14px;font-weight:600}
#badge{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;background:#333;color:#aaa;transition:all .3s}
.s-ok{background:#064e3b!important;color:#6ee7b7!important}
.s-warn{background:#78350f!important;color:#fbbf24!important}
.s-bad{background:#7f1d1d!important;color:#fca5a5!important}
#vid-wrap{position:relative;flex:1;overflow:hidden;background:#000}
#vid-wrap video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#cv{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#bar-w{padding:6px 16px 4px;background:#111}
#bar-bg{height:14px;background:#222;border-radius:7px;position:relative;overflow:hidden}
#bar-f{height:100%;border-radius:7px;transition:width .1s,background .2s;width:0}
#bar-m{position:absolute;top:0;height:100%;width:2px;background:#fff;opacity:.6}
#bar-l{display:flex;justify-content:space-between;font-size:10px;color:#666;padding:2px 4px 0}
#nums{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;padding:8px 12px;background:#111}
.n{background:#1a1a1a;border-radius:10px;padding:8px 6px;text-align:center}
.nt{font-size:10px;color:#888;margin-bottom:3px}
.nv{font-size:18px;font-weight:700}
#btns{padding:8px 16px 16px;background:#111;display:flex;gap:8px}
#btns button{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
#btns button:active{opacity:.7}
#ble-bar{padding:6px 16px;background:#0d1117;display:flex;align-items:center;gap:10px}
#ble-bar button{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#1d4ed8;color:#fff}
#ble-bar button:active{opacity:.7}
#ble-status{font-size:12px;color:#888;flex:1}
#ble-dot{width:10px;height:10px;border-radius:50%;background:#555;transition:background .3s}
#ble-dot.on{background:#22c55e;box-shadow:0 0 8px #22c55e}
#al{position:fixed;top:0;left:0;right:0;bottom:0;display:none;align-items:center;justify-content:center;z-index:100;pointer-events:none}
#al.on{display:flex;animation:pu .5s ease-in-out infinite alternate}
@keyframes pu{from{background:rgba(220,38,38,0)}to{background:rgba(220,38,38,.15)}}
#al span{font-size:48px;font-weight:800;color:#ef4444;text-shadow:0 0 40px rgba(239,68,68,.5)}
#load{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0a;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px}
#load.gone{display:none}
.spin{width:44px;height:44px;border:3px solid #333;border-top-color:#3b82f6;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#load-msg{font-size:15px;color:#ccc;text-align:center;line-height:1.8}
#logbox{font-size:11px;color:#888;text-align:left;max-height:200px;overflow-y:auto;width:100%;max-width:360px;background:#111;border-radius:8px;padding:10px;font-family:monospace;line-height:1.5;word-break:break-all}
#set{display:none;position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;border-radius:16px 16px 0 0;padding:20px 16px 30px;z-index:50}
#set.on{display:block}
.sr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #2a2a2a}
.sr label{font-size:13px}
.sr input[type=range]{width:120px}
.sr .v{font-size:13px;font-weight:600;min-width:40px;text-align:right}
</style>
</head>
<body>

<div id="load">
  <div class="spin"></div>
  <div id="load-msg">시작 중...</div>
  <div id="logbox"></div>
</div>

<div id="top">
  <h1>스마트 독서대 v4</h1>
  <div id="badge">로딩 중</div>
</div>

<!-- BLE connection bar -->
<div id="ble-bar">
  <div id="ble-dot"></div>
  <span id="ble-status">아두이노 미연결</span>
  <button id="b-ble">블루투스 연결</button>
</div>

<div id="bar-w">
  <div id="bar-bg"><div id="bar-f"></div><div id="bar-m"></div></div>
  <div id="bar-l"><span>눈 감김</span><span>EAR</span><span>눈 뜸</span></div>
</div>

<div id="vid-wrap">
  <video id="vid" playsinline autoplay muted></video>
  <canvas id="cv"></canvas>
</div>

<div id="nums">
  <div class="n"><div class="nt">EAR</div><div class="nv" id="v-ear" style="color:#6ee7b7">—</div></div>
  <div class="n"><div class="nt">상태</div><div class="nv" id="v-st" style="font-size:15px">—</div></div>
  <div class="n"><div class="nt">감김시간</div><div class="nv" id="v-cnt" style="color:#fbbf24">0s</div></div>
  <div class="n"><div class="nt">전송</div><div class="nv" id="v-ble" style="font-size:13px;color:#888">—</div></div>
</div>

<div id="btns">
  <button style="background:#333;color:#fff" id="b-reset">초기화</button>
  <button id="b-snd" style="background:#1d4ed8;color:#fff">알림 ON</button>
  <button style="background:#dc2626;color:#fff" id="b-test">BLE 테스트</button>
  <button style="background:#333;color:#fff" id="b-set">설정</button>
</div>
<div id="ble-help" style="display:none;padding:6px 16px 2px;background:#111;font-size:11px;color:#fbbf24;line-height:1.6">
  ⚡ HELLO → 초록 LED 2번 깜빡 = 정상<br>
  ⚡ DROWSY → 빨간 LED 깜빡 + 부저/진동 = 정상<br>
  ⚡ OK → 모두 꺼짐 = 정상<br>
  ❌ 아무 반응 없음 = 배선 확인 (TX↔RX, 3.3V)
</div>

<div id="al"><span>눈을 떠!</span></div>

<div id="set">
  <div class="sr">
    <label>EAR 임계값</label>
    <input type="range" min="0.08" max="0.25" step="0.01" value="0.15" id="r-th">
    <span class="v" id="sv1">0.15</span>
  </div>
  <div class="sr">
    <label>감지 시간(초)</label>
    <input type="range" min="2" max="15" step="1" value="5" id="r-dur">
    <span class="v" id="sv2">5.0</span>
  </div>
</div>

<script type="module">

function $(id){ return document.getElementById(id); }
function addLog(msg){
  var box = $('logbox');
  if(!box) return;
  var now = new Date();
  var ts = now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  box.innerHTML += ts + ' ' + msg + '<br>';
  box.scrollTop = box.scrollHeight;
  console.log('[LOG] ' + msg);
}

// ============ STATE ============
var EAR_TH = 0.15;
var CLOSE_DUR = 5.0;
var soundOn = true;
var closedSince = 0;
var totalClosedTime = 0;  // 누적 감김 시간 (밀리초)
var isAlerted = false;
var audioCtx = null;
var videoEl, canvasEl, drawCtx, detector;
var lastTs = -1;

// BLE state
var bleDevice = null;
var bleChar = null;
var bleConnected = false;

// HM-10 BLE UART UUIDs
var BLE_SERVICE = 0xFFE0;
var BLE_CHAR = 0xFFE1;

// EAR indices
var R_EYE = [33, 160, 158, 133, 153, 144];
var L_EYE = [362, 385, 387, 263, 373, 380];
var R_OUTLINE = [33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246];
var L_OUTLINE = [362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398];

// ============ BLE CONNECTION ============
async function connectBLE(){
  if(!navigator.bluetooth){
    alert('이 브라우저는 Web Bluetooth를 지원하지 않습니다.\nAndroid Chrome을 사용해주세요.');
    return;
  }

  $('ble-status').textContent = '검색 중...';

  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: [BLE_SERVICE] }],
      optionalServices: [BLE_SERVICE]
    });

    $('ble-status').textContent = '연결 중...';

    bleDevice.addEventListener('gattserverdisconnected', function(){
      bleConnected = false;
      bleChar = null;
      $('ble-dot').classList.remove('on');
      $('ble-status').textContent = '연결 끊김';
      $('b-ble').textContent = '재연결';
    });

    var server = await bleDevice.gatt.connect();
    var service = await server.getPrimaryService(BLE_SERVICE);
    bleChar = await service.getCharacteristic(BLE_CHAR);

    bleConnected = true;
    $('ble-dot').classList.add('on');
    $('ble-status').textContent = bleDevice.name || 'BLE 연결됨';
    $('b-ble').textContent = '연결됨';

    // BLE 특성 정보 로그 (디버그용)
    var p = bleChar.properties;
    console.log('[BLE] Properties - write:' + p.write + ' writeWithoutResponse:' + p.writeWithoutResponse + ' read:' + p.read + ' notify:' + p.notify);
    $('ble-status').textContent = (bleDevice.name || 'BLE') + ' (W:' + (p.write?'Y':'N') + ' WnR:' + (p.writeWithoutResponse?'Y':'N') + ')';

    // 연결 확인 전송
    await sendBLE('HELLO');

  } catch(err) {
    $('ble-status').textContent = '연결 실패: ' + err.message;
    $('b-ble').textContent = '재시도';
    bleConnected = false;
  }
}

async function sendBLE(cmd){
  if(!bleConnected || !bleChar) return;

  try {
    var encoder = new TextEncoder();
    var data = encoder.encode(cmd + '\n');
    var sent = false;

    // 방법 1: writeValueWithoutResponse (대부분의 HM-10)
    if(!sent && bleChar.properties.writeWithoutResponse) {
      try {
        await bleChar.writeValueWithoutResponse(data);
        sent = true;
      } catch(e) { console.log('Method 1 failed:', e.message); }
    }
    // 방법 2: writeValueWithResponse
    if(!sent && bleChar.properties.write) {
      try {
        await bleChar.writeValueWithResponse(data);
        sent = true;
      } catch(e) { console.log('Method 2 failed:', e.message); }
    }
    // 방법 3: writeValue (구버전 호환)
    if(!sent) {
      try {
        await bleChar.writeValue(data);
        sent = true;
      } catch(e) { console.log('Method 3 failed:', e.message); }
    }

    if(sent) {
      $('v-ble').textContent = cmd;
      $('v-ble').style.color = cmd === 'OK' ? '#6ee7b7' : (cmd === 'DROWSY' ? '#fca5a5' : '#fbbf24');
    } else {
      $('v-ble').textContent = 'ERR';
      $('v-ble').style.color = '#fca5a5';
    }
  } catch(err) {
    console.log('BLE send error:', err.message);
    $('v-ble').textContent = 'ERR';
    $('v-ble').style.color = '#fca5a5';
  }
}

// 상태가 변할 때만 전송 (중복 방지는 하되 rate limit 제거)
var currentState = '';
function sendState(state){
  if(state === currentState) return;
  currentState = state;
  sendBLE(state);
}

// ============ BUTTON HANDLERS ============
$('b-reset').onclick = function(){ closedSince=0; totalClosedTime=0; $('v-cnt').textContent='0s'; $('v-cnt').style.color='#6ee7b7'; };
$('b-snd').onclick = function(){
  soundOn = !soundOn;
  $('b-snd').textContent = soundOn ? '알림 ON' : '알림 OFF';
  $('b-snd').style.background = soundOn ? '#1d4ed8' : '#555';
  if(soundOn && !audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
};
$('b-test').onclick = function(){
  if(!bleConnected) { alert('블루투스 먼저 연결하세요!'); return; }
  $('ble-help').style.display = 'block';
  $('v-ble').textContent = '...';
  $('v-ble').style.color = '#888';
  $('b-test').textContent = '전송 중...';
  $('b-test').disabled = true;

  currentState = '';
  // 1단계: HELLO → 초록 LED 깜빡 (또는 비프)
  sendBLE('HELLO');
  $('v-st').textContent = '→HELLO'; $('v-st').style.color = '#6ee7b7';

  setTimeout(function(){
    currentState = '';
    // 2단계: DROWSY → 빨간 LED + 부저 + 진동
    sendBLE('DROWSY');
    $('v-st').textContent = '→DROWSY'; $('v-st').style.color = '#fca5a5';
  }, 1500);

  setTimeout(function(){
    currentState = '';
    // 3단계: OK → 모든 출력 꺼짐
    sendBLE('OK');
    $('v-st').textContent = '→OK'; $('v-st').style.color = '#6ee7b7';
    $('b-test').textContent = 'BLE 테스트';
    $('b-test').disabled = false;
  }, 3000);
};
$('b-set').onclick = function(){ $('set').classList.toggle('on'); };
$('b-ble').onclick = function(){ connectBLE(); };
$('r-th').oninput = function(){ EAR_TH = parseFloat(this.value); $('sv1').textContent = this.value; $('bar-m').style.left = (EAR_TH/0.4*100)+'%'; };
$('r-dur').oninput = function(){ CLOSE_DUR = parseFloat(this.value); $('sv2').textContent = parseFloat(this.value).toFixed(1); };
$('bar-m').style.left = (EAR_TH / 0.4 * 100) + '%';

// ============ MAIN INIT ============
async function main(){
  addLog('앱 시작 v4+BLE');

  // CAMERA
  $('load-msg').textContent = '카메라 접근 요청 중...';
  var stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: {ideal:640}, height: {ideal:480} },
      audio: false
    });
    addLog('카메라 OK');
  } catch(err) {
    addLog('카메라 실패: ' + err.message);
    $('load-msg').innerHTML = '<b style="color:#fca5a5">카메라 실패</b><br><br>' + err.message;
    return;
  }

  videoEl = $('vid');
  videoEl.srcObject = stream;
  await videoEl.play();
  while(videoEl.videoWidth === 0) await new Promise(function(r){ setTimeout(r, 100); });
  addLog('비디오: ' + videoEl.videoWidth + 'x' + videoEl.videoHeight);

  canvasEl = $('cv');
  canvasEl.width = videoEl.videoWidth;
  canvasEl.height = videoEl.videoHeight;
  drawCtx = canvasEl.getContext('2d');

  // MEDIAPIPE
  $('load-msg').textContent = 'AI 엔진 로딩 중...\n(첫 실행 시 10~20초)';
  addLog('MediaPipe 로딩...');

  var FaceLandmarker, FilesetResolver;
  try {
    var vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs");
    FaceLandmarker = vision.FaceLandmarker;
    FilesetResolver = vision.FilesetResolver;
    addLog('import OK');
  } catch(err) {
    addLog('import 실패: ' + err.message);
    $('load-msg').innerHTML = '<b style="color:#fca5a5">MediaPipe 실패</b><br>' + err.message;
    return;
  }

  var fileset;
  try {
    fileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm");
    addLog('WASM OK');
  } catch(err) {
    addLog('WASM 실패: ' + err.message);
    $('load-msg').innerHTML = '<b style="color:#fca5a5">WASM 실패</b><br>' + err.message;
    return;
  }

  // GPU, then CPU fallback
  var modelUrl = "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task";
  try {
    detector = await FaceLandmarker.createFromOptions(fileset, {
      baseOptions: { modelAssetPath: modelUrl, delegate: "GPU" },
      runningMode: "VIDEO", numFaces: 1
    });
    addLog('GPU OK');
  } catch(err) {
    addLog('GPU 실패, CPU 시도...');
    try {
      detector = await FaceLandmarker.createFromOptions(fileset, {
        baseOptions: { modelAssetPath: modelUrl, delegate: "CPU" },
        runningMode: "VIDEO", numFaces: 1
      });
      addLog('CPU OK');
    } catch(err2) {
      addLog('모두 실패: ' + err2.message);
      $('load-msg').innerHTML = '<b style="color:#fca5a5">AI 로딩 실패</b><br>' + err2.message;
      return;
    }
  }

  addLog('준비 완료!');
  $('load').classList.add('gone');
  $('badge').textContent = '준비 완료'; $('badge').className = 's-ok';
  requestAnimationFrame(tick);
}

// ============ DETECTION LOOP ============
function tick(){
  var now = performance.now();
  if(now <= lastTs){ requestAnimationFrame(tick); return; }
  lastTs = now;
  drawCtx.clearRect(0, 0, canvasEl.width, canvasEl.height);

  var result;
  try { result = detector.detectForVideo(videoEl, now); }
  catch(err){ requestAnimationFrame(tick); return; }

  if(result && result.faceLandmarks && result.faceLandmarks.length > 0){
    var raw = result.faceLandmarks[0];
    var w = canvasEl.width, h = canvasEl.height;
    var pts = [];
    for(var i = 0; i < raw.length; i++){
      pts.push({ x: (1 - raw[i].x) * w, y: raw[i].y * h });
    }

    var earLeft = calcEAR(pts, L_EYE);
    var earRight = calcEAR(pts, R_EYE);
    var earAvg = (earLeft + earRight) / 2;

    drawOutline(pts, R_OUTLINE, earAvg);
    drawOutline(pts, L_OUTLINE, earAvg);
    drawDots(pts, R_EYE);
    drawDots(pts, L_EYE);
    updateDisplay(earAvg);
    checkDrowsy(earAvg);
  } else {
    $('badge').textContent = '얼굴 없음'; $('badge').className = 's-warn';
    $('v-ear').textContent = '—';
    $('v-st').textContent = '없음'; $('v-st').style.color = '#888';
    hideAlert();
    if(closedSince !== 0){ var ms=Date.now()-closedSince; if(ms>=3000) totalClosedTime+=ms; }
    closedSince = 0;
    sendState('AWAY');
  }
  requestAnimationFrame(tick);
}

// ============ EAR ============
function dist(a,b){ return Math.sqrt((a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y)); }
function calcEAR(pts,idx){
  var A = dist(pts[idx[1]], pts[idx[5]]);
  var B = dist(pts[idx[2]], pts[idx[4]]);
  var C = dist(pts[idx[0]], pts[idx[3]]);
  return C < 0.001 ? 0 : (A + B) / (2 * C);
}

// ============ DRAW ============
function drawOutline(pts,idx,ear){
  drawCtx.beginPath();
  drawCtx.strokeStyle = ear < EAR_TH ? 'rgba(239,68,68,.85)' : 'rgba(110,231,183,.7)';
  drawCtx.lineWidth = 2.5;
  for(var i=0;i<idx.length;i++){ var p=pts[idx[i]]; i===0?drawCtx.moveTo(p.x,p.y):drawCtx.lineTo(p.x,p.y); }
  drawCtx.closePath(); drawCtx.stroke();
}
function drawDots(pts,idx){
  for(var i=0;i<idx.length;i++){ var p=pts[idx[i]]; drawCtx.beginPath(); drawCtx.arc(p.x,p.y,4,0,Math.PI*2); drawCtx.fillStyle=(i===0||i===3)?'#34d399':'#f97316'; drawCtx.fill(); }
}

// ============ UI ============
function updateDisplay(ear){
  $('v-ear').textContent = ear.toFixed(2);
  var pct = Math.min(Math.max(ear/0.4*100,2),100);
  $('bar-f').style.width = pct+'%';
  if(ear >= EAR_TH){
    $('v-ear').style.color='#6ee7b7'; $('bar-f').style.background='#059669';
    $('v-st').textContent='집중'; $('v-st').style.color='#6ee7b7';
    $('badge').textContent='집중 중'; $('badge').className='s-ok';
  } else {
    $('v-ear').style.color='#fca5a5'; $('bar-f').style.background='#dc2626';
    $('v-st').textContent='감김!'; $('v-st').style.color='#fca5a5';
    $('badge').textContent='눈 감김'; $('badge').className='s-bad';
  }
}

// ============ DROWSINESS + BLE ============
function checkDrowsy(ear){
  var now = Date.now();
  if(ear < EAR_TH){
    if(closedSince === 0) closedSince = now;
    var sec = (now - closedSince) / 1000;
    var totalSec = (totalClosedTime + (now - closedSince)) / 1000;

    // 누적 감김 시간 표시
    $('v-cnt').textContent = formatTime(totalSec);
    if(sec >= CLOSE_DUR) {
      $('v-cnt').style.color = '#fca5a5';
    } else if(sec >= 5) {
      $('v-cnt').style.color = '#fbbf24';
    } else {
      $('v-cnt').style.color = '#6ee7b7';
    }

    if(sec >= CLOSE_DUR && !isAlerted){
      isAlerted = true;
      showAlert();
      if(soundOn) playBeep();
      sendState('DROWSY');
    } else if(sec >= 3) {
      sendState('CLOSED');
    }
  } else {
    // 눈 떴을 때: 3초 이상 감았을 때만 누적
    if(closedSince !== 0) {
      var closedMs = (now - closedSince);
      if(closedMs >= 3000) {
        totalClosedTime += closedMs;
      }
    }
    closedSince = 0;
    if(isAlerted){ isAlerted = false; hideAlert(); }
    sendState('OK');
  }
}

function formatTime(sec) {
  if(sec < 60) return sec.toFixed(1) + 's';
  var m = Math.floor(sec / 60);
  var s = Math.floor(sec % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function showAlert(){ $('al').classList.add('on'); }
function hideAlert(){ $('al').classList.remove('on'); }

function playBeep(){
  try {
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=880;o.type='square';g.gain.value=0.15;
    o.start();o.stop(audioCtx.currentTime+0.3);
    setTimeout(function(){
      if(!isAlerted||!soundOn)return;
      var o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
      o2.connect(g2);g2.connect(audioCtx.destination);
      o2.frequency.value=1200;o2.type='square';g2.gain.value=0.15;
      o2.start();o2.stop(audioCtx.currentTime+0.3);
    },400);
  }catch(e){}
}

main();
</script>
